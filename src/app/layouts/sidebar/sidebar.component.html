<aside
  class="fixed inset-y-0 left-0 z-20 flex w-64 flex-col gap-4 border-r border-slate-200 bg-slate-50 p-4 shadow-xl transition-transform duration-200 md:static md:translate-x-0 md:shadow-none"
  [class.-translate-x-full]="collapsed"
  [class.translate-x-0]="!collapsed"
>
  <div class="flex items-center justify-between gap-3 text-sm font-semibold text-slate-900">
    <span>Navigation</span>
    <button
      class="rounded-2xl bg-slate-100 px-3 py-2 text-slate-700 transition hover:bg-slate-200 md:hidden"
      type="button"
      aria-label="Close sidebar"
      (click)="closeSidebar.emit()"
    >
      ×
    </button>
  </div>

  <nav class="flex flex-col gap-2 text-sm font-semibold text-slate-700">
    <a
      *ngFor="let item of navigation"
      routerLink="{{ item.path }}"
      routerLinkActive="active"
      [routerLinkActiveOptions]="{ exact: item.path === '/' }"
      class="rounded-2xl px-4 py-3 transition hover:bg-slate-100 hover:text-slate-900"
    >
      {{ item.label }}
    </a>
  </nav>
</aside>
