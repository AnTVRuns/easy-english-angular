<section class="grid gap-6">
  <div class="rounded-3xl bg-white p-6 shadow-sm md:flex md:items-center md:justify-between md:gap-6">
    <div>
      <p class="text-sm font-semibold uppercase tracking-[0.28em] text-blue-600">Welcome back</p>
      <h1 class="mt-4 text-3xl font-semibold text-slate-900">Admin dashboard</h1>
      <p class="mt-3 max-w-2xl text-slate-600">
        Review users, track system health, and manage access from a compact admin view.
      </p>
    </div>
    <button
      class="mt-4 rounded-2xl bg-blue-600 px-5 py-3 text-sm font-semibold text-white transition hover:bg-blue-700 md:mt-0"
      type="button"
      (click)="navigateToUsers()"
    >
      View users
    </button>
  </div>

  <div class="grid gap-4 lg:grid-cols-3">
    <article class="rounded-3xl border border-slate-200 bg-white p-6 shadow-sm">
      <h2 class="text-xl font-semibold text-slate-900">Users</h2>
      <p class="mt-3 text-slate-600">Manage user accounts and roles.</p>
    </article>
    <article class="rounded-3xl border border-slate-200 bg-sky-50 p-6 shadow-sm">
      <h2 class="text-xl font-semibold text-slate-900">Activity</h2>
      <p class="mt-3 text-slate-600">Live metrics are coming soon.</p>
    </article>
    <article class="rounded-3xl border border-slate-200 bg-white p-6 shadow-sm">
      <h2 class="text-xl font-semibold text-slate-900">Reports</h2>
      <p class="mt-3 text-slate-600">See the most important system updates.</p>
    </article>
  </div>
</section>
